{% extends "layout.html" %}

{% block title %}
Agenda Deportiva
{% endblock %}

{% block page_title %}
Agenda Deportiva
{% endblock %}

{% block content %}

<div class="card card-custom">

    <div class="card-body">

        <h3>⚽ Agenda Deportiva</h3>

        <hr>

        <button class="btn btn-main">

            🔄 Actualizar FutbolEnLaTV

        </button>

        <br><br>

        <table class="table table-dark table-hover">

            <thead>

                <tr>

                    <th>Hora</th>

                    <th>Evento</th>

                    <th>Canal</th>

                    <th></th>

                </tr>

            </thead>

            <tbody>

                {% for e in eventos %}

                <tr>

                    <td>{{ e.time }}</td>

                    <td>{{ e.title }}</td>

                    <td>{{ e.channel }}</td>

                    <td>

                        <button class="btn btn-sm btn-primary">

                            Editar

                        </button>

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
