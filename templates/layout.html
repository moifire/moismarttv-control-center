<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% block title %}MoiSmartTV Control Center PRO{% endblock %}</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Fuente -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        body{

            background:#0f172a;

            color:white;

            font-family:Poppins,sans-serif;

            overflow-x:hidden;

        }

        .sidebar{

            width:250px;

            background:#111827;

            position:fixed;

            top:0;

            bottom:0;

            left:0;

            padding:25px;

            border-right:1px solid #1f2937;

        }

        .logo{

            font-size:28px;

            font-weight:700;

            color:white;

            margin-bottom:40px;

        }

        .logo span{

            color:#dc2626;

        }

        .menu a{

            display:block;

            color:#cbd5e1;

            text-decoration:none;

            padding:14px;

            margin-bottom:10px;

            border-radius:10px;

            transition:.25s;

            font-size:16px;

        }

        .menu a:hover{

            background:#2563eb;

            color:white;

            transform:translateX(5px);

        }

        .content{

            margin-left:250px;

            padding:30px;

        }

        .topbar{

            background:#111827;

            padding:18px;

            border-radius:15px;

            margin-bottom:25px;

        }

        .card-custom{

            background:#111827;

            border:none;

            border-radius:18px;

            color:white;

            transition:.25s;

        }

        .card-custom:hover{

            transform:translateY(-5px);

            box-shadow:0 0 25px rgba(37,99,235,.25);

        }

        .footer{

            margin-top:50px;

            text-align:center;

            color:#94a3b8;

            font-size:14px;

        }

        .btn-main{

            background:#2563eb;

            border:none;

            color:white;

        }

        .btn-main:hover{

            background:#1d4ed8;

        }

    </style>

    {% block css %}{% endblock %}

</head>

<body>

<div class="sidebar">

    <div class="logo">

        <span>Moi</span>SmartTV

        <div style="font-size:13px;color:#94a3b8">

            Control Center PRO

        </div>

    </div>

    <div class="menu">

        <a href="/"><i class="bi bi-speedometer2"></i> Dashboard</a>

        <a href="/agenda"><i class="bi bi-calendar-event"></i> Agenda</a>

        <a href="/iptv"><i class="bi bi-tv"></i> IPTV</a>

        <a href="/stremio"><i class="bi bi-play-circle"></i> Stremio</a>

        <a href="/movies"><i class="bi bi-film"></i> Películas</a>

        <a href="/series"><i class="bi bi-collection-play"></i> Series</a>

        <a href="/logos"><i class="bi bi-image"></i> Logos</a>

        <a href="/settings"><i class="bi bi-gear"></i> Configuración</a>

    </div>

</div>

<div class="content">

    <div class="topbar d-flex justify-content-between align-items-center">

        <div>

            <h3 style="margin:0">

                {% block page_title %}

                Dashboard

                {% endblock %}

            </h3>

        </div>

        <div>

            <button class="btn btn-main">

                <i class="bi bi-arrow-repeat"></i>

                Actualizar MoiSmartTV

            </button>

        </div>

    </div>

    {% block content %}

    {% endblock %}

    <div class="footer">

        MoiSmartTV Control Center PRO © 2026

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>

{% block js %}{% endblock %}

</body>

</html>
